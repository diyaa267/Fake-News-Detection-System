<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detect Fake News</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header>
    <h1>📰 Fake News Detection</h1>

    <nav>
        <a href="/">Home</a>
        <a href="/detect">Detect</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
    </nav>
</header>

<div class="container">

    <h2>Enter News Article</h2>

    <form action="/detect" method="POST">

        <textarea
            name="news"
            rows="10"
            placeholder="Paste your news article here..."
            required>{{ news }}</textarea>

        <br><br>

        <button type="submit">
            Detect News
        </button>

    </form>

    {% if prediction %}

    <div class="result">

        <h2>Prediction Result</h2>

        {% if prediction == "REAL" %}
            <h3 style="color:green;">✅ REAL NEWS</h3>
        {% else %}
            <h3 style="color:red;">❌ FAKE NEWS</h3>
        {% endif %}

    </div>

    {% endif %}

</div>

<footer>
    <p>Fake News Detection System © 2026</p>
</footer>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
